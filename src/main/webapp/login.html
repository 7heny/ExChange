<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ExChange - Вход</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container auth-container">
    <div class="card auth-card">
        <h2>🔐 Вход в ExChange</h2>
        <form method="post" action="/auth">
            <div class="form-group">
                <input type="text" name="login" placeholder="Логин" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Пароль" required>
            </div>
            <button type="submit">Войти</button>
            <div id="errorMsg" class="error-message" style="margin-top: 15px;"></div>
        </form>
        <div class="login-link" style="text-align: center; margin-top: 20px;">
            Нет аккаунта? <a href="/register">Зарегистрироваться</a>
        </div>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    const success = urlParams.get('success');
    if (error) {
        document.getElementById('errorMsg').innerText = decodeURIComponent(error);
    }
    if (success) {
        document.getElementById('errorMsg').style.color = '#4CAF50';
        document.getElementById('errorMsg').innerText = decodeURIComponent(success);
    }
</script>
</body>
</html>
