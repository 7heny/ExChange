<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ExChange - Регистрация</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .register-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="register-box">
    <h2>📝 Регистрация в ExChange</h2>
    <form method="post" action="/register">
        <input type="text" name="login" placeholder="Логин" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <input type="text" name="fullName" placeholder="Полное имя (необязательно)">
        <button type="submit">Зарегистрироваться</button>
    </form>
    <div class="login-link">
        Уже есть аккаунт? <a href="/auth">Войти</a>
    </div>
    <div id="message"></div>
</div>

<script>
    // Показываем сообщение из URL параметра
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    const success = urlParams.get('success');

    if (error) {
        const msgDiv = document.getElementById('message');
        msgDiv.className = 'error';
        msgDiv.innerText = decodeURIComponent(error);
    }
    if (success) {
        const msgDiv = document.getElementById('message');
        msgDiv.className = 'success';
        msgDiv.innerText = decodeURIComponent(success);
    }
</script>
</body>
</html>
