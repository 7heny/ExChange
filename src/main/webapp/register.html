<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ExChange - Регистрация</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container auth-container">
    <div class="card auth-card">
        <h2>📝 Регистрация в ExChange</h2>
        <form method="post" action="/register">
            <div class="form-group">
                <input type="text" name="login" placeholder="Логин" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Пароль" required>
            </div>
            <div class="form-group">
                <input type="text" name="fullName" placeholder="Полное имя (необязательно)">
            </div>
            <button type="submit">Зарегистрироваться</button>
            <div id="message" class="error-message" style="margin-top: 15px;"></div>
        </form>
        <div class="login-link" style="text-align: center; margin-top: 20px;">
            Уже есть аккаунт? <a href="/auth">Войти</a>
        </div>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    const success = urlParams.get('success');
    if (error) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = decodeURIComponent(error);
    }
    if (success) {
        const msgDiv = document.getElementById('message');
        msgDiv.style.color = '#4CAF50';
        msgDiv.innerText = decodeURIComponent(success);
    }
</script>
</body>
</html>
